<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Calculator</h1>

    <div id="calculator">

      <!-- Display Screen -->
      <div id="display">
        <p id="expression"></p>
        <p id="result">0</p>
      </div>

      <!-- Button Grid -->
      <div id="buttons">

        <!-- Row 1 -->
        <button id="btn-clear" class="btn-utility">C</button>
        <button id="btn-empty-1" class="btn-utility" disabled></button>
        <button id="btn-empty-2" class="btn-utility" disabled></button>
        <button id="btn-divide" class="btn-operator">÷</button>

        <!-- Row 2 -->
        <button id="btn-7" class="btn-number">7</button>
        <button id="btn-8" class="btn-number">8</button>
        <button id="btn-9" class="btn-number">9</button>
        <button id="btn-multiply" class="btn-operator">×</button>

        <!-- Row 3 -->
        <button id="btn-4" class="btn-number">4</button>
        <button id="btn-5" class="btn-number">5</button>
        <button id="btn-6" class="btn-number">6</button>
        <button id="btn-subtract" class="btn-operator">−</button>

        <!-- Row 4 -->
        <button id="btn-1" class="btn-number">1</button>
        <button id="btn-2" class="btn-number">2</button>
        <button id="btn-3" class="btn-number">3</button>
        <button id="btn-add" class="btn-operator">+</button>

        <!-- Row 5 -->
        <button id="btn-0" class="btn-number btn-zero">0</button>
        <button id="btn-decimal" class="btn-number">.</button>
        <button id="btn-equals" class="btn-equals">=</button>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
